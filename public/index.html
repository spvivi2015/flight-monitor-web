<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flight Monitor Web</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="wrap">
      <h1>✈️ Flight Monitor Web</h1>
      <p>輸入航班編號（例如 <code>CI100</code>）即可即時查詢。</p>

      <form id="form" class="card">
        <label for="flight">航班編號</label>
        <div class="row">
          <input id="flight" name="flight" placeholder="CI100" required />
          <button type="submit">查詢</button>
        </div>
        <div class="row">
          <label class="inline"><input id="auto" type="checkbox" /> 每 60 秒自動更新</label>
        </div>
      </form>

      <section id="status" class="card hidden"></section>
      <section id="error" class="card error hidden"></section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
